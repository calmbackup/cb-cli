name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux_amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: linux_arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross (for arm64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Run tests
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          TARBALL="calmbackup_${VERSION}_${{ matrix.name }}.tar.gz"
          tar -czf "${TARBALL}" -C target/${{ matrix.target }}/release calmbackup
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.TARBALL }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true

      - name: Notify LogBlazer
        continue-on-error: true
        env:
          LOGBLAZER_KEY: ${{ secrets.LOGBLAZER_KEY }}
        run: |
          [ -z "$LOGBLAZER_KEY" ] && exit 0
          curl -s -X POST "https://app.logblazer.com/api/logs/${LOGBLAZER_KEY}" \
            -d "payload=CLI ${{ github.ref_name }} published" \
            -d "status=SUCCESS" \
            -d "source=github-release" \
            -d "monitor_title=Latest CLI Version" \
            -d "monitor_type=text" \
            -d "monitor_value=${{ github.ref_name }}"
